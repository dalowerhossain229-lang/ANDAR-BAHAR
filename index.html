<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANDAR BAHAR CASINO KING</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🎰 ক্যাসিনো হেডার প্যানেল -->
    <div class="header">
        <div class="brand">
            <div class="name">ANDAR BAHAR</div>
            <div class="game">ASIAN CARD SHOWDOWN</div>
        </div>
        <div class="header-right">
            <button class="sound-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
            <div class="balance-box">৳ <span id="user-balance">0.00</span></div>
        </div>
    </div>

    <!-- 🃏 [মাঝখানের মেইন জোকার বেস কার্ড স্লট] -->
    <div class="joker-container-zone">
        <div class="joker-title">JOKER CARD</div>
        <div class="card-slot main-joker-slot">
            <div class="playing-card" id="joker-card">🎴</div>
        </div>
    </div>

    <!-- 🐉 [অন্দর বনাম বাহার লাইভ ৩ডি কার্ড ডিলিং জোন] -->
    <div class="game-battle-zone">
        <!-- অন্দর সাইড (বাম পক্ষ) -->
        <div class="side-panel andar-zone">
            <div class="side-title">ANDAR (ভেতর)</div>
            <div class="card-slot">
                <div class="playing-card" id="andar-card">🎴</div>
            </div>
        </div>

        <!-- বাহার সাইড (ডান পক্ষ) -->
        <div class="side-panel bahar-zone">
            <div class="side-title">BAHAR (বাহির)</div>
            <div class="card-slot">
                <div class="playing-card" id="bahar-card">🎴</div>
            </div>
        </div>
    </div>

    <!-- 🏆 ইন-লাইন বাজি ধরার ২টি প্রধান বোর্ড ঘর ভাই ভাই -->
    <div class="betting-board">
        <button class="bet-board-btn andar-bet-btn" id="board-andar" onclick="selectBetSide('ANDAR')">
            <span class="board-label">ANDAR (ভেতর) 👈</span>
            <span class="board-odds">x2.00</span>
        </button>
        
        <button class="bet-board-btn bahar-bet-btn" id="board-bahar" onclick="selectBetSide('BAHAR')">
            <span class="board-label">BAHAR (বাহির) 👉</span>
            <span class="board-odds">x2.00</span>
        </button>
    </div>

    <!-- 🏆 ইন-লাইন লাইভ স্কোরিং মেসেজ বার -->
    <div class="win-status-container" id="win-status-box">
        <span id="win-text-msg">ANDAR বা BAHAR সিলেক্ট করে DEAL বোতাম চাপুন ভাই!</span>
    </div>

    <!-- 🎛️ কন্ট্রোল প্যানেল এরিয়া (৳১-৳২০০০ প্লাস-মাইনাস ও DEAL বোতাম পাশাপাশি লক ভাই) -->
    <div class="footer-controls">
        <div class="play-section">
            <div class="bet-selector">
                <button class="bet-btn-nav" onclick="adjustBet('minus')">−</button>
                <div style="text-align: center; width: 60px;">
                    <div style="font-size: 9px; color: #aaa; font-weight: bold;">BET</div>
                    <div style="font-size: 15px; font-weight: 900; color: #fff;" id="bet-display">৳৫০</div>
                </div>
                <button class="bet-btn-nav" onclick="adjustBet('plus')">+</button>
            </div>

            <button class="play-btn" id="spin-btn" onclick="handleAndarBaharDeal()">DEAL</button>

            <div class="icon-group">
                <button class="icon-btn" id="auto-btn" onclick="toggleAuto()">🔄</button>
            </div>
        </div>
    </div>

    <!-- 🔌 [উইনগো কালার ট্রেড সিঙ্ক - ইউনিভার্সাল সকেট ইঞ্জিন লাইব্রেরি ভাই] -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "guest_user";
        const urlWallet = urlParams.get('wallet') || "main";
        
        const SERVER_URL = window.location.origin;

        let balance = 0.00;
        let currentBet = 50; 
        let selectedOption = null; // ANDAR, BAHAR
        let isSpinning = false; 
        let isAuto = false;
        let isMuted = false;
        let autoInterval = null;

        if (typeof io !== 'undefined') {
            const socket = io();
            socket.on("balanceUpdate", (data) => {
                if (data && data.username === urlUserId) {
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    fetchLiveBalance();
                }
            });
        }

        async function fetchLiveBalance() {
            try {
                const response = await fetch(`${SERVER_URL}/api/andarbahar-balance?userId=${urlUserId}&wallet=${urlWallet}`);
                const data = await response.json();
                if (data && data.success) {
                    balance = parseFloat(data.balance);
                    document.getElementById("user-balance").innerText = balance.toFixed(2);
                }
            } catch (e) { console.error("Balance lag"); }
        }

        // শুরুতে বেস জোকার কার্ড নিয়ে আসার গেটওয়ে ভাই ভাই
        async function initJokerCard() {
            try {
                const response = await fetch(`${SERVER_URL}/api/andarbahar-init?userId=${urlUserId}`);
                const data = await response.json();
                if (data && data.success) {
                    const jokerCell = document.getElementById("joker-card");
                    jokerCell.innerText = `${data.jokerCard.value}${data.jokerCard.suit}`;
                    jokerCell.className = "playing-card";
                    if (data.jokerCard.suit === "♥️" || data.jokerCard.suit === "♦️") jokerCell.style.color = "#ea2027";
                    else jokerCell.style.color = "#000000";
                }
            } catch (e) { console.error("Joker allocation lag"); }
        }

        window.onload = () => {
            if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
            fetchLiveBalance();
            initJokerCard();
        };

        function selectBetSide(side) {
            if (isSpinning) return;
            selectedOption = side;
            
            document.querySelectorAll(".bet-board-btn").forEach(b => b.classList.remove("active-side-bet"));
            if (side === 'ANDAR') document.getElementById("board-andar").classList.add("active-side-bet");
            if (side === 'BAHAR') document.getElementById("board-bahar").classList.add("active-side-bet");
            
            playAudio('click');
        }

        function adjustBet(action) {
            if (isSpinning) return;
            if (action === 'minus' && currentBet > 1) {
                if (currentBet <= 10) currentBet -= 1;
                else if (currentBet <= 100) currentBet -= 10;
                else currentBet -= 50;
            }
            if (action === 'plus' && currentBet < 2000) {
                if (currentBet < 10) currentBet += 1;
                else if (currentBet < 100) currentBet += 10;
                else currentBet += 50;
            }
            if (currentBet < 1) currentBet = 1;
            if (currentBet > 2000) currentBet = 2000;
            
            document.getElementById("bet-display").innerText = `৳${currentBet}`;
            playAudio('click');
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById("mute-btn").innerText = isMuted ? "🔇" : "🔊";
            document.getElementById("mute-btn").classList.toggle("muted-active", isMuted);
        }

                function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById("auto-btn").classList.toggle("active", isAuto);
            if (isAuto && !isSpinning) handleAndarBaharDeal();
            playAudio('click');
        }

        async function handleAndarBaharDeal() {
            if (isSpinning) return;
            if (!selectedOption) {
                alert("🚨 আগে বাজি ধরার যেকোনো ১টি পক্ষ (ANDAR বা BAHAR) সিলেক্ট করুন ভাই!");
                isAuto = false;
                document.getElementById("auto-btn").classList.remove("active");
                return;
            }

            const aCard = document.getElementById("andar-card");
            const bCard = document.getElementById("bahar-card");
            const msgBox = document.getElementById("win-status-box");
            
            msgBox.className = "win-status-container";
            document.getElementById("win-text-msg").innerText = "🃏 ডিলার দুই পক্ষে তাস বন্টন করছে...";

            // ওল্ড কার্ড রিসেট এবং ৩ডি এনিমেশন বাউন্স ভাই ভাই
            aCard.className = "playing-card card-dealing";
            bCard.className = "playing-card card-dealing";
            aCard.innerText = "🎴";
            bCard.innerText = "🎴";
            aCard.style.color = "#000000";
            bCard.style.color = "#000000";

            isSpinning = true;
            document.getElementById("spin-btn").disabled = true;

            // 🚀 তাস ফ্লিপ হওয়ার কড়া স্পিড সাউন্ড spin2.mp3 ফায়ার লক ভাই!
            playAudio('spin');

            try {
                const response = await fetch(`${SERVER_URL}/api/andarbahar-deal`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: urlUserId,
                        amount: parseFloat(currentBet),
                        wallet: urlWallet,
                        prediction: selectedOption
                    })
                });

                const data = await response.json();

                if (data && data.success === true) {
                    balance = parseFloat(data.balance);
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    if (window.top) window.top.postMessage({ action: "refresh_wallet" }, "*");

                    // ২.৫ সেকেন্ডের ৩ডি কার্ড শাফল এবং ডিলিং অ্যানিমেশন শেষ হওয়ার পর ওরিজিনাল কার্ড শোডাউন হবে
                    setTimeout(() => {
                        // ১. অন্দর কার্ড লাইভ ওপেন ভাই ভাই
                        aCard.className = "playing-card";
                        aCard.innerText = `${data.andarCard.value}${data.andarCard.suit}`;
                        if (data.andarCard.suit === "♥️" || data.andarCard.suit === "♦️") aCard.style.color = "#ea2027";
                        else aCard.style.color = "#000000";

                        // ২. বাহার কার্ড লাইভ ওপেন ভাই ভাই
                        bCard.className = "playing-card";
                        bCard.innerText = `${data.baharCard.value}${data.baharCard.suit}`;
                        if (data.baharCard.suit === "♥️" || data.baharCard.suit === "♦️") bCard.style.color = "#ea2027";
                        else bCard.style.color = "#000000";

                        showFinalResult(data.status, data.winAmount, data.winnerSide);
                    }, 2500);

                } else {
                    alert(data.message || "❌ Insufficient Balance! Please Recharge.");
                    stopDealState();
                }
            } catch (err) {
                alert("⚠️ সেশন আউট! আবার DEAL বোতাম চাপুন ভাই ভাই।");
                stopDealState();
            }
        }

        function showFinalResult(status, winAmount, winnerSide) {
            const msgBox = document.getElementById("win-status-box");
            const textMsg = document.getElementById("win-text-msg");

            const sideNameBengali = (winnerSide === "ANDAR") ? "ANDAR (ভেতর)" : "BAHAR (বাহির)";

            if (status === "win") {
                // 🎵 বাজি জিতে টাকা ২ গুণ ডবল হওয়ামাত্রই win2.mp3 রাজকীয় সাউন্ড ফায়ার লক ভাই!
                playAudio('win');
                msgBox.className = "win-status-container win-glow-bar";
                textMsg.innerText = `🏆 মেগা উইন!! জোকার তাস মিলেছে পক্ষ: ${sideNameBengali} এ (৳${winAmount})`;
            } else {
                msgBox.className = "win-status-container lose-glow-bar";
                textMsg.innerText = `❌ জোকার তাস মিলেছে পক্ষ: ${sideNameBengali} এ। এই রাউন্ডে লাভ হয়নি ভাই!`;
            }

            document.getElementById("user-balance").innerText = balance.toFixed(2);
            
            // রাউন্ড শেষে নতুন ফ্রেশ জোকার কার্ড ম্যাপ রি-লোডার ভাই ভাই
            setTimeout(() => {
                initJokerCard();
                stopDealState();

                if (isAuto) {
                    autoInterval = setTimeout(() => {
                        if (isAuto) handleAndarBaharDeal();
                    }, 1500);
                }
            }, 1000);
        }

        function stopDealState() {
            isSpinning = false;
            document.getElementById("spin-btn").disabled = false;
            if (!isAuto && autoInterval) clearTimeout(autoInterval);
        }

        // 🎯 [আপনার রিকোয়ারমেন্ট অনুযায়ী ৩টি প্রিমিয়াম সাউন্ড ও বাফার গেটওয়ে লক ভাই ভাই]
        const slotSounds = {
            click: new Audio('click2.mp3'),
            spin: new Audio('spin2.mp3'),
            win: new Audio('win2.mp3')
        };
        Object.values(slotSounds).forEach(s => s.load());

        function playAudio(type) { 
            if (isMuted) return; // 🔇 সাউন্ড অফ থাকলে কোনো অডিও প্লে হবে না ভাই ভাই!
            try { 
                slotSounds[type].currentTime = 0; 
                slotSounds[type].play(); 
            } catch(e){} 
        }
    </script>
</body>
</html>
