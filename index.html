<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANDAR BAHAR - ASIAN CARD SHOWDOWN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🎰 ক্যাসিনো হেডার প্যানেল (ব্যালেন্স বক্স সহ ১ শতভাগ ডাইস-৩ডি স্ট্যান্ডার্ডে নিখুঁত লক ভাই ভাই) -->
    <div class="header">
        <div class="brand">
            <div class="name">ANDAR BAHAR</div>
            <div class="game">ASIAN CARD SHOWDOWN</div>
        </div>
        <div class="header-right">
            <button class="sound-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
            <div class="balance-box">৳ <span id="user-balance">0.00</span></div>
        </div>
    </div>

    <!-- 🃏 জোকার কার্ড জোন এরিয়া ভাই ভাই -->
    <div class="joker-zone">
        <div class="joker-title">JOKER CARD</div>
        <div class="joker-card-frame" id="joker-card-container">
            <!-- ওরিজিনাল জোকার কার্ড এখানে ১ শতভাগ একুরেটলি লোড হবে ভাই -->
            <div class="card-back-default">♣️♠️</div>
        </div>
    </div>

    <!-- 🎰 অন্দর ও বাহিরের তাস লাইভ ডিলিং প্যানেল জোন ভাই ভাই -->
    <div class="board-dealing-zone">
        <!-- অন্দর (ভেতর) কলাম -->
        <div class="board-column andar-bg-glow">
            <div class="column-header-title header-andar">ANDAR (ভেতর)</div>
            <div class="cards-display-grid" id="andar-cards-container"></div>
        </div>

        <!-- বাহির (বাহির) কলাম -->
        <div class="board-column bahar-bg-glow">
            <div class="column-header-title header-bahar">BAHAR (বাহির)</div>
            <div class="cards-display-grid" id="bahar-cards-container"></div>
        </div>
    </div>

    <!-- 🎯 বাজি ধরার প্রধান ২টি নিয়ন বেটিং বোর্ড ঘর (১.৯৫ ওডস ডিসপ্লে কড়া লক ভাই ভাই) -->
    <div class="betting-board">
        <button class="bet-board-btn andar-select-btn" id="board-ANDAR" onclick="selectBetSide('ANDAR')">
            <span class="board-label">ANDAR (ভেতর) 👉</span>
            <span class="board-odds">x1.95</span>
        </button>
        <button class="bet-board-btn bahar-select-btn" id="board-BAHAR" onclick="selectBetSide('BAHAR')">
            <span class="board-label">BAHAR (বাহির) 👈</span>
            <span class="board-odds">x1.95</span>
        </button>
    </div>

    <!-- 🏆 ইন-লাইন লাইভ স্কোরিং মেসেজ বার -->
    <div class="win-status-container" id="win-status-box">
        <span id="win-text-msg">ANDAR বা BAHAR সিলেক্ট করে DEAL বোতাম চাপুন ভাই!</span>
    </div>

        <!-- 🎛️ কন্ট্রোল প্যানেল এরিয়া (৳fifty জ্যাম চিরতরে মুক্ত করে পিউর সংখ্যা ৫০ লক ভাই ভাই) -->
    <div class="footer-controls">
        <div class="play-section">
            <div class="bet-selector">
                <button class="bet-btn-nav" onclick="adjustBet('minus')">−</button>
                <div style="text-align: center; width: 60px;">
                    <div style="font-size: 9px; color: #aaa; font-weight: bold;">BET</div>
                    <div style="font-size: 15px; font-weight: 900; color: #fff;" id="bet-display">৳৫০</div>
                </div>
                <button class="bet-btn-nav" onclick="adjustBet('plus')">+</button>
            </div>

            <button class="play-btn" id="spin-btn" onclick="handleAndarBaharDeal()">DEAL</button>

            <div class="icon-group">
                <button class="icon-btn" id="auto-btn" onclick="toggleAuto()">🔄</button>
            </div>
        </div>
    </div>


    <!-- 🔌 [উইনগো কালার ট্রেড সিঙ্ক - ইউনিভার্সাল সকেট ইঞ্জিন লাইব্রেরি ভাই] -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "guest_user";
        const urlWallet = urlParams.get('wallet') || "main";
        
        const SERVER_URL = window.location.origin;

        let balance = 0.00;
        let currentBet = 50; 
        let selectedSide = null; 
        let isSpinning = false; 
        let isAuto = false;
        let isMuted = false;
        let autoInterval = null;

        // 🧠 [১ শতভাগ একুরেট কার্ড ডিলিং এবং ম্যাচিং ম্যাজিক ইঞ্জিন ভাই ভাই]
        function animateCardDealing(serverData) {
            const andarZone = document.getElementById("andar-cards-container");
            const baharZone = document.getElementById("bahar-cards-container");
            const jokerZone = document.getElementById("joker-card-container");

            // ১. ওরিজিনাল জোকার কার্ড স্ক্রিনে ১ শতভাগ একুরেটলি ড্র ভাই ভাই
            const jCard = serverData.jokerCard;
            jokerZone.innerHTML = `<img src="./cards/${jCard.value}_of_${jCard.suit.toUpperCase()}.png" class="card-img" alt="Joker" onerror="this.onerror=null; this.src='./cards/${jCard.value}_of_${jCard.suit.toLowerCase()}.png';">`;

            // ২. ওরিজিনাল অন্দর ও বাহিরের তাসের অ্যারে ব্যাকএন্ড থেকে ডিরেক্ট ক্যাচ লক
            const andarList = serverData.andarCards || [];
            const baharList = serverData.baharCards || [];

            andarZone.innerHTML = "";
            baharZone.innerHTML = "";

            let maxCardsCount = Math.max(andarList.length, baharList.length);
            let currentCardIdx = 0;

            // ⏱️ লাইভ ক্যাসিনো স্টাইলে ২৫০ মিলি-সেকেন্ড পর পর ১টি করে তাস একুরেটলি ফেলার টাইমার লুপ
            const cardDealingInterval = setInterval(() => {
                if (currentCardIdx >= maxCardsCount) {
                    clearInterval(cardDealingInterval);
                    showFinalGameReward(serverData.status, serverData.winAmount, serverData.result);
                    return;
                }

                // অন্দরের তাস একুরেট সিঙ্ক লেভেলে পুশ ভাই ভাই
                if (currentCardIdx < andarList.length) {
                    const c = andarList[currentCardIdx];
                    const cardDiv = document.createElement("div");
                    cardDiv.className = "card-deal-animation-node";
                    cardDiv.innerHTML = `<img src="./cards/${c.value}_of_${c.suit.toUpperCase()}.png" class="card-img" onerror="this.onerror=null; this.src='./cards/${c.value}_of_${c.suit.toLowerCase()}.png';">`;
                    andarZone.appendChild(cardDiv);
                    
                    // 🎯 যদি এই তাসটিই জোকারের মান স্পর্শ করে, তবে ওখানেই এниемেশন নিখুঁত থমকে দাঁড়াবে!
                    if (c.value === jCard.value && serverData.result === "ANDAR") {
                        clearInterval(cardDealingInterval);
                        showFinalGameReward(serverData.status, serverData.winAmount, "ANDAR");
                        return;
                    }
                }

                // বাহিরের তাস একুরেট সিঙ্ক লেভেলে পুশ ভাই ভাই
                if (currentCardIdx < baharList.length) {
                    const c = baharList[currentCardIdx];
                    const cardDiv = document.createElement("div");
                    cardDiv.className = "card-deal-animation-node";
                    cardDiv.innerHTML = `<img src="./cards/${c.value}_of_${c.suit.toUpperCase()}.png" class="card-img" onerror="this.onerror=null; this.src='./cards/${c.value}_of_${c.suit.toLowerCase()}.png';">`;
                    baharZone.appendChild(cardDiv);
                    
                    // 🎯 যদি এই তাসটিই জোকারের মান স্পর্শ করে, তবে ওখানেই এниемেশন নিখুঁত থমকে দাঁড়াবে!
                    if (c.value === jCard.value && serverData.result === "BAHAR") {
                        clearInterval(cardDealingInterval);
                        showFinalGameReward(serverData.status, serverData.winAmount, "BAHAR");
                        return;
                    }
                }

                currentCardIdx++;
            }, 250); // 🚀 ২৫০ মিলি-সেকেন্ড ওরিজিনাল প্রফেশনাল স্পিড ভাই ভাই
        }

        // 🛫 কোর DEAL বোতাম ট্রিগার অ্যাকশন গেটওয়ে ভাই ভাই
        async function handleAndarBaharDeal() {
            if (isSpinning) return;
            if (!selectedSide) {
                alert("🚨 আগে বাজি ধরার যেকোনো ১টি দিক (ANDAR বা BAHAR) সিলেক্ট করুন ভাই!");
                isAuto = false;
                document.getElementById("auto-btn").classList.remove("active");
                return;
            }

            isSpinning = true;
            document.getElementById("spin-btn").disabled = true;
            document.getElementById("win-status-box").className = "win-status-container";
            document.getElementById("win-text-msg").innerText = "🃏 ডিলার তাস ডিলিং করছে সচল মোডে...";

            playAudio('click');
            playAudio('spin');

            try {
                const response = await fetch(`${SERVER_URL}/api/andar-deal`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: urlUserId,
                        amount: parseFloat(currentBet),
                        wallet: urlWallet,
                        prediction: selectedSide
                    })
                });

                const data = await response.json();

                if (data && data.success === true) {
                    balance = parseFloat(data.balance);
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    if (window.top) window.top.postMessage({ action: "refresh_wallet" }, "*");

                    // ডাটা আসার পর লাইভ এনিমেশন লুপ ফায়ার লক ভাই ভাই
                    animateCardDealing(data);
                } else {
                    alert(data.message || "❌ Insufficient Balance! Please Recharge.");
                    stopAndarState();
                }
                        } catch (err) {
                alert("⚠️ সেশন আউট! আবার DEAL বোতাম চাপুন ভাই ভাই।");
                stopAndarState();
            }
        }

        function showFinalGameReward(status, winAmount, winnerSide) {
            const msgBox = document.getElementById("win-status-box");
            const textMsg = document.getElementById("win-text-msg");

            if (status === "win") {
                playAudio('win');
                msgBox.className = "win-status-container win-glow-bar";
                textMsg.innerText = `🏆 মেগা উইন!! তাস মিলেছে: ${winnerSide} [৳${winAmount}]`;
            } else {
                playAudio('wheel'); 
                msgBox.className = "win-status-container lose-glow-bar";
                textMsg.innerText = `❌ তাস মিলেছে: ${winnerSide}। এই রাউন্ডে বাজি লস ভাই ভাই!`;
            }

            document.getElementById("user-balance").innerText = balance.toFixed(2);
            stopAndarState();

            if (isAuto) {
                autoInterval = setTimeout(() => {
                    if (isAuto) handleAndarBaharDeal();
                }, 3000); // অটো স্পিন ৩ সেকেন্ড বাফার সেফটি ভাই
            }
        }

        if (typeof io !== 'undefined') {
            const socket = io();
            socket.on("balanceUpdate", (data) => {
                if (data && data.username === urlUserId) {
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    fetchLiveBalance();
                }
            });
        }

        async function fetchLiveBalance() {
            try {
                const response = await fetch(`${SERVER_URL}/api/andar-balance?userId=${urlUserId}&wallet=${urlWallet}`);
                const data = await response.json();
                if (data && data.success) {
                    balance = parseFloat(data.balance);
                    document.getElementById("user-balance").innerText = balance.toFixed(2);
                }
            } catch (e) { console.error("Balance lag query pass"); }
        }

        window.onload = () => {
            if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
            fetchLiveBalance();
        };

        function selectBetSide(side) {
            if (isSpinning) return;
            selectedSide = side;
            document.querySelectorAll(".bet-board-btn").forEach(b => b.classList.remove("active-side-bet"));
            document.getElementById(`board-${side}`).classList.add("active-side-bet");
            playAudio('click');
        }

        function adjustBet(action) {
            if (isSpinning) return;
            if (action === 'minus' && currentBet > 1) {
                if (currentBet <= 10) currentBet -= 1;
                else if (currentBet <= 100) currentBet -= 10;
                else if (currentBet <= 1000) currentBet -= 100;
                else currentBet -= 500;
            }
            if (action === 'plus' && currentBet < 20000) {
                if (currentBet < 10) currentBet += 1;
                else if (currentBet < 100) currentBet += 10;
                else if (currentBet < 1000) currentBet += 100;
                else currentBet += 500;
            }
            if (currentBet < 1) currentBet = 1;
            if (currentBet > 20000) currentBet = 20000;
            
            document.getElementById("bet-display").innerText = `৳${currentBet}`;
            playAudio('click');
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById("mute-btn").innerText = isMuted ? "🔇" : "🔊";
            document.getElementById("mute-btn").classList.toggle("muted-active", isMuted);
            slotSounds.click.muted = isMuted;
            slotSounds.spin.muted = isMuted;
            slotSounds.win.muted = isMuted;
            slotSounds.wheel.muted = isMuted;
        }

        function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById("auto-btn").classList.toggle("active", isAuto);
            if (isAuto && !isSpinning) handleAndarBaharDeal();
            playAudio('click');
        }

        function stopAndarState() {
            isSpinning = false;
            document.getElementById("spin-btn").disabled = false;
            if (!isAuto && autoInterval) clearTimeout(autoInterval);
        }

        // 🎯 [৪টি ওরিজিনাল প্রিমিয়াম ক্যাসিনো সাউন্ড ও বাফার গেটওয়ে লক ভাই ভাই]
        const slotSounds = {
            click: new Audio('click2.mp3'),
            spin: new Audio('spin2.mp3'),
            win: new Audio('win2.mp3'),
            wheel: new Audio('wheel1.mp3')
        };
        Object.values(slotSounds).forEach(s => s.load());

        function playAudio(type) { 
            if (isMuted) return; 
            try { 
                slotSounds[type].currentTime = 0; 
                slotSounds[type].play(); 
            } catch(e){} 
        }
    </script>
</body>
</html>
